<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歴史タイムライン</title>
  <link rel="stylesheet" href="css/timeline.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
</head>
<body>

<div id="app">

  <!-- ── Sidebar ── -->
  <div id="sidebar">
    <div id="sidebar-inner">
      <h1>
        <span class="h1-text">歴史タイムライン<span>Historical Timeline</span></span>
        <button id="toggle-btn" onclick="toggleSidebar()" title="閉じる">◀</button>
      </h1>
      <div class="era-list" id="era-list"></div>
      <div class="filter-section" id="filters"></div>
      <div id="sidebar-footer">
        <button onclick="openAddModal()">＋ データセットを追加</button>
      </div>
    </div>
  </div>

  <!-- ── Main ── -->
  <div id="main">

    <!-- Toolbar -->
    <div id="toolbar">
      <button id="expand-btn" onclick="toggleSidebar()" title="サイドバーを開く" style="display:none">▶</button>
      <span class="t-title" id="t-title">読み込み中…</span>
      <div class="legend" id="legend"></div>
      <span id="zoom-info">100%</span>
      <!-- Sort segmented control -->
      <div class="seg-ctrl">
        <button class="seg-btn seg-active" id="sort-birth"   onclick="setSort('birth')">生年順</button>
        <button class="seg-btn"            id="sort-cat"     onclick="setSort('category')">カテゴリ別</button>
      </div>
      <button class="tbtn" onclick="zoomOut()">－ 縮小</button>
      <button class="tbtn" onclick="zoomIn()">＋ 拡大</button>
      <button class="tbtn" onclick="resetZoom()">リセット</button>

      <!-- Hamburger button -->
      <button id="hamburger-btn" onclick="toggleMenu(event)" title="メニュー">
        <span></span><span></span><span></span>
      </button>

      <!-- Dropdown menu -->
      <div id="hamburger-menu" class="hidden">
        <!-- Theme toggle -->
        <div class="theme-toggle" onclick="toggleTheme()">
          <span class="hm-icon" id="theme-icon">🌙</span>
          <span class="hm-label" id="theme-label">ライトモードに切替</span>
          <div class="pill"></div>
        </div>
        <div class="hmenu-sep"></div>
        <!-- Data add -->
        <div class="hmenu-item" onclick="openAddModal(); closeMenu()">
          <span class="hm-icon">＋</span>
          <span class="hm-label">データセットを追加</span>
        </div>
        <div class="hmenu-sep"></div>
        <!-- Zoom shortcuts -->
        <div class="hmenu-item" onclick="zoomIn(); closeMenu()">
          <span class="hm-icon">🔍</span>
          <span class="hm-label">拡大</span>
          <span class="hm-badge">+</span>
        </div>
        <div class="hmenu-item" onclick="zoomOut(); closeMenu()">
          <span class="hm-icon">🔎</span>
          <span class="hm-label">縮小</span>
          <span class="hm-badge">-</span>
        </div>
        <div class="hmenu-item" onclick="resetZoom(); closeMenu()">
          <span class="hm-icon">↺</span>
          <span class="hm-label">ズームリセット</span>
          <span class="hm-badge">0</span>
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div id="chart-wrap"></div>

    <!-- Age Panel (slides in from right when a year is selected) -->
    <div id="age-panel">
      <div id="age-panel-head">
        <div id="age-panel-year"></div>
        <button id="age-panel-close" onclick="closeAgePanel()" title="閉じる">✕</button>
      </div>
      <div id="age-panel-subtitle">その年の年齢</div>
      <div id="age-panel-list"></div>
    </div>

  </div><!-- /#main -->

</div><!-- /#app -->

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- Add dataset modal -->
<div class="modal-bg hidden" id="modal-bg">
  <div class="modal-box">
    <div class="modal-head">
      <h2>データセットを追加</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="data/kamakura.js"></script>
<script src="data/sengoku.js"></script>
<script src="data/bakumatsu.js"></script>
<script src="data/historie.js"></script>
<script src="data/sangokushi.js"></script>
<script src="data/nigejozu.js"></script>
<script src="data/reiri.js"></script>
<script src="data/ooku.js"></script>
<script src="data/fuunji.js"></script>
<script src="js/timeline.js"></script>

</body>
</html>
