<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歴史タイムライン</title>
  <link rel="stylesheet" href="css/timeline.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <link rel="icon" href="./favicon.png" type="image/png">
  <link rel="shortcut icon" href="./favicon.ico">
</head>
<body>

<div id="app">

  <!-- ── Sidebar ── -->
  <div id="sidebar">
    <div id="sidebar-inner">
      <h1>
        <span class="h1-text">歴史タイムライン<span>Historical Timeline</span></span>
        <button id="toggle-btn" onclick="toggleSidebar()" title="閉じる">◀</button>
      </h1>
      <div class="era-list" id="era-list"></div>
      <div class="filter-section" id="filters"></div>
      <div id="sidebar-footer">
        <button onclick="openAddModal()">＋ データセットを追加</button>
      </div>
    </div>
  </div>

  <!-- ── Main ── -->
  <div id="main">

    <!-- Toolbar -->
    <div id="toolbar">
      <button id="expand-btn" onclick="toggleSidebar()" title="サイドバーを開く" style="display:none">▶</button>
      <span class="t-title" id="t-title">読み込み中…</span>
      <div class="legend" id="legend"></div>
      <span id="zoom-info">100%</span>
      <!-- Sort segmented control -->
      <div class="seg-ctrl">
        <button class="seg-btn seg-active" id="sort-birth"   onclick="setSort('birth')">生年順</button>
        <button class="seg-btn"            id="sort-cat"     onclick="setSort('category')">カテゴリ別</button>
      </div>
      <button class="tbtn" onclick="zoomOut()">－ 縮小</button>
      <button class="tbtn" onclick="zoomIn()">＋ 拡大</button>
      <button class="tbtn" onclick="resetZoom()">リセット</button>

      <!-- Hamburger button -->
      <button id="hamburger-btn" onclick="toggleMenu(event)" title="メニュー">
        <span></span><span></span><span></span>
      </button>

      <!-- Dropdown menu -->
      <div id="hamburger-menu" class="hidden">
        <!-- Theme toggle -->
        <div class="theme-toggle" onclick="toggleTheme()">
          <span class="hm-icon" id="theme-icon">🌙</span>
          <span class="hm-label" id="theme-label">ライトモードに切替</span>
          <div class="pill"></div>
        </div>
        <div class="hmenu-sep"></div>
        <!-- Help -->
        <div class="hmenu-item" onclick="openHelpModal(); closeMenu()">
          <span class="hm-icon">？</span>
          <span class="hm-label">ヘルプ / ショートカット</span>
          <span class="hm-badge">H</span>
        </div>
        <div class="hmenu-sep"></div>
        <!-- Data add -->
        <div class="hmenu-item" onclick="openAddModal(); closeMenu()">
          <span class="hm-icon">＋</span>
          <span class="hm-label">データセットを追加</span>
        </div>
        <div class="hmenu-sep"></div>
        <!-- Zoom shortcuts -->
        <div class="hmenu-item" onclick="zoomIn(); closeMenu()">
          <span class="hm-icon">🔍</span>
          <span class="hm-label">拡大</span>
          <span class="hm-badge">+</span>
        </div>
        <div class="hmenu-item" onclick="zoomOut(); closeMenu()">
          <span class="hm-icon">🔎</span>
          <span class="hm-label">縮小</span>
          <span class="hm-badge">-</span>
        </div>
        <div class="hmenu-item" onclick="resetZoom(); closeMenu()">
          <span class="hm-icon">↺</span>
          <span class="hm-label">ズームリセット</span>
          <span class="hm-badge">0</span>
        </div>
        <!-- External links -->
        <div class="hmenu-sep"></div>
        <a class="hmenu-item" href="https://x.com/nakadanobuhiro" target="_blank" rel="noopener" onclick="closeMenu()">
          <span class="hm-icon hm-icon-svg">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          </span>
          <span class="hm-label">X (Twitter)</span>
        </a>
        <a class="hmenu-item" href="https://github.com/NAKADANobuhiro/timeline" target="_blank" rel="noopener" onclick="closeMenu()">
          <span class="hm-icon hm-icon-svg">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
          </span>
          <span class="hm-label">GitHub</span>
        </a>
        <!-- Sort (mobile only: desktop uses toolbar) -->
        <div class="hmenu-sep mobile-only"></div>
        <div class="hmenu-item mobile-only" id="hm-sort-birth" onclick="setSort('birth'); closeMenu()">
          <span class="hm-icon">📅</span>
          <span class="hm-label">生年順</span>
        </div>
        <div class="hmenu-item mobile-only" id="hm-sort-cat" onclick="setSort('category'); closeMenu()">
          <span class="hm-icon">🏷️</span>
          <span class="hm-label">カテゴリ別</span>
        </div>
      </div>
    </div>

    <!-- Chart + Age Panel row -->
    <div id="chart-row">
    <div id="chart-wrap"></div>

    <!-- Age Panel (expands from right when a year is selected) -->
    <div id="age-panel">
      <div id="age-panel-head">
        <div id="age-panel-year"></div>
        <button id="age-panel-close" onclick="closeAgePanel()" title="閉じる">✕</button>
      </div>
      <div id="age-panel-subtitle">その年の年齢</div>
      <div id="age-panel-list"></div>
    </div>
    </div><!-- /#chart-row -->

  </div><!-- /#main -->

</div><!-- /#app -->

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- Add dataset modal -->
<div class="modal-bg hidden" id="modal-bg">
  <div class="modal-box">
    <div class="modal-head">
      <h2>データセットを追加</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="data/kamakura.js"></script>
<script src="data/sengoku.js"></script>
<script src="data/bakumatsu.js"></script>
<script src="data/historie.js"></script>
<script src="data/sangokushi.js"></script>
<script src="data/nigejozu.js"></script>
<script src="data/reiri.js"></script>
<script src="data/silence.js"></script>
<script src="data/ooku.js"></script>
<script src="data/fuunji.js"></script>
<script src="data/ad_astra.js"></script>
<script src="data/taiheiki.js"></script>
<script src="data/PrimeMinister_Ja.js"></script>
<script src="data/games.js"></script>
<script src="data/gundam_uc1.js"></script>
<script src="js/timeline.js"></script>
</body>
</html>
